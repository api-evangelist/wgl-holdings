aid: wgl-holdings
name: WGL Holdings
description: >-
  WGL Holdings was an integrated energy holding company headquartered in Washington, D.C.,
  serving over 1 million customers across the District of Columbia, Maryland, and Virginia.
  Its operations spanned regulated natural gas distribution (Washington Gas), retail energy
  marketing (WGL Energy Services), commercial energy systems, and midstream energy services
  (WGL Midstream, Hampshire Gas). WGL Holdings was acquired by AltaGas on July 6, 2018,
  and continues to operate as a subsidiary.
