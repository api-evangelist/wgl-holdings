apis:
  - aid: wgl-holdings:washington-gas
    name: Washington Gas
    description: >-
      Washington Gas is the regulated natural gas distribution utility subsidiary of
      WGL Holdings, providing safe, reliable, and affordable natural gas to more than
      1.2 million customers in the District of Columbia, Maryland, and Virginia. It is
      one of the oldest gas utilities in the United States, founded in 1848.
    humanURL: https://www.washingtongas.com
