  - aid: wgl-holdings:wgl-midstream
    name: WGL Midstream
    description: >-
      WGL Midstream, Inc. is a subsidiary of Washington Gas Resources engaged in acquiring
      and optimizing natural gas storage and transportation assets. It focuses on midstream
      energy services including gas storage, pipeline capacity, and energy asset management.
    humanURL: https://www.wgl.com
    tags:
      - Midstream
