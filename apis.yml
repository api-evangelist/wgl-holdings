  - aid: wgl-holdings:wgl-energy-services
    name: WGL Energy Services
    description: >-
      WGL Energy Services is an unregulated retail energy subsidiary of WGL Holdings
      that sells natural gas and electricity to commercial, industrial, and residential
      customers in Maryland, Virginia, Delaware, Pennsylvania, Ohio, D.C., and New Jersey.
      It also offers renewable energy products and carbon neutrality solutions.
    humanURL: https://www.wglenergy.com
