        url: https://www.wgl.com

  - aid: wgl-holdings:hampshire-gas
    name: Hampshire Gas
    description: >-
      Hampshire Gas Company owns and operates interests in natural gas storage facilities
      in and around Hampshire County, West Virginia. It provides underground natural gas
      storage services that support pipeline operations and supply reliability.
    humanURL: https://www.wgl.com
    tags:
